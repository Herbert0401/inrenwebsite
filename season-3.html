    <style>
      .season1-placeholder-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        width: min(1200px, calc(100% - 2.5rem));
        margin: 0 auto 4.6rem;
      }

      .season1-card {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        align-items: center;
      }

      .season1-placeholder-box {
        width: 100%;
        min-height: 221px;
        margin: 12px 0;
        border: 1px dashed transparent;
        background: rgba(45, 88, 71, 0.1);
        display: grid;
        place-items: center;
        color: var(--muted);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        overflow: hidden;
      }

      .season1-placeholder-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      .season1-detail-link {
        display: block;
        text-decoration: none;
        width: 85%;
      }

      .season1-detail-link:focus-visible {
        outline: 2px solid #00ff66;
        outline-offset: 4px;
      }

      .season1-price {
        width: 85%;
        color: #00ff66;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1;
      }

      .season1-price::before {
        content: "\00A5";
        margin-right: 0.2em;
      }

      .sub-hero {
        margin-top: -150px;
      }

      @media (max-width: 940px) {
        .season1-placeholder-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .season1-placeholder-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

    <script src="asset-base.js"></script>

    <script src="data/products.js"></script>
    <script>
      (function () {
        const cards = document.querySelectorAll('.season1-card');
        const boxes = document.querySelectorAll('.season1-placeholder-box');
        const seasonKey = document.body.dataset.season || '3';
        const productsBySeason = (window.INREN_PRODUCTS && window.INREN_PRODUCTS.bySeason) || {};
        const seasonProducts = productsBySeason[seasonKey] || [];
        const resolveAsset = window.inrenResolveAssetUrl || ((value) => value);

        boxes.forEach((box, index) => {
          const card = cards[index];
          const image = box.querySelector('img');

          if (image) {
            const source = image.getAttribute('src') || image.src;
            image.src = resolveAsset(source);
            image.loading = 'lazy';
            image.decoding = 'async';
          }

          if (card) {
            const priceNode = card.querySelector('.season1-price');
            if (priceNode) {
              priceNode.textContent = priceNode.textContent.trim();
            }
          }

          if (box.parentElement && box.parentElement.classList.contains('season1-detail-link')) {
            return;
          }

          const fallbackId = `s${seasonKey}-${String(index + 1).padStart(3, '0')}`;
          const productId = (seasonProducts[index] && seasonProducts[index].id) || fallbackId;
          const detailPage = `product-detail.html?id=${encodeURIComponent(productId)}`;
          const link = document.createElement('a');
          link.href = detailPage;
          link.className = 'season1-detail-link';
          link.setAttribute('aria-label', `Open detail page ${index + 1}`);

          box.parentNode.insertBefore(link, box);
          link.appendChild(box);
        });
      })();
    </script>

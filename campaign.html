      body.campaign-page {
        position: relative;
        isolation: isolate;
        min-height: 100vh;
        background-color: #040102;
        color: #9C0C0C;
        overflow-x: hidden;
      }

      .campaign-backdrop {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 16% 18%, rgba(128, 0, 0, 0.28) 0 8%, transparent 24%),
          radial-gradient(circle at 84% 14%, rgba(62, 0, 0, 0.36) 0 7%, transparent 22%),
          radial-gradient(circle at 28% 76%, rgba(150, 0, 0, 0.2) 0 9%, transparent 26%),
          linear-gradient(135deg, #070203 0%, #0f0204 34%, #040102 100%);
      }

      .campaign-backdrop::before,
      .campaign-backdrop::after {
        content: "";
        position: fixed;
        inset: -22vmax;
        pointer-events: none;
        z-index: 0;
      }

      .campaign-backdrop::before {
        background:
          conic-gradient(from 215deg at 22% 26%, transparent 0 12%, rgba(120, 0, 0, 0.24) 12% 18%, transparent 18% 38%, rgba(58, 0, 0, 0.32) 38% 44%, transparent 44% 100%),
          conic-gradient(from 35deg at 78% 22%, transparent 0 10%, rgba(160, 0, 0, 0.16) 10% 16%, transparent 16% 42%, rgba(78, 0, 0, 0.24) 42% 49%, transparent 49% 100%),
          radial-gradient(circle at 18% 20%, rgba(170, 0, 0, 0.5) 0 4%, transparent 15%),
          radial-gradient(circle at 70% 14%, rgba(110, 0, 0, 0.34) 0 5%, transparent 18%),
          radial-gradient(circle at 36% 64%, rgba(138, 0, 0, 0.26) 0 7%, transparent 23%),
          radial-gradient(circle at 82% 72%, rgba(72, 0, 0, 0.28) 0 6%, transparent 22%);
        filter: blur(40px) saturate(135%);
        opacity: 0.95;
        mix-blend-mode: screen;
        transform: rotate(-6deg);
      }

      .campaign-backdrop::after {
        background:
          radial-gradient(circle at 50% 50%, transparent 0 22%, rgba(0, 0, 0, 0.46) 58%, transparent 74%),
          radial-gradient(circle at 20% 72%, rgba(86, 0, 0, 0.18) 0 7%, transparent 24%),
          radial-gradient(circle at 74% 56%, rgba(102, 0, 0, 0.2) 0 8%, transparent 26%),
          conic-gradient(from 128deg at 44% 58%, transparent 0 28%, rgba(126, 0, 0, 0.16) 28% 34%, transparent 34% 58%, rgba(30, 0, 0, 0.28) 58% 64%, transparent 64% 100%);
        filter: blur(18px);
        opacity: 0.7;
        mix-blend-mode: multiply;
      }

      .campaign-page .grain,
      .campaign-page .site-header,
      .campaign-page main,
      .campaign-page .site-footer {
        position: relative;
        z-index: 1;
      }

      .campaign-page .site-header,
      .campaign-page .site-header a,
      .campaign-page .site-header h1,
      .campaign-page .sub-hero,
      .campaign-page .sub-hero p,
      .campaign-page .sub-hero h1,
      .campaign-page .overline,
      .campaign-page .site-footer,
      .campaign-page .site-footer p {
        color: #9C0C0C;
      }

      .campaign-gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.8rem;
        padding: 2rem 1.25rem;
        max-width: 1200px;
        margin: 0 auto;
        contain: content;
      }

      .gallery-item {
        position: relative;
        contain: content;
        content-visibility: auto;
        contain-intrinsic-size: 420px 560px;
      }

      .gallery-item.landscape-item {
        grid-column: span 2;
        display: flex;
        justify-content: center;
      }

      .gallery-image {
        width: 100%;
        aspect-ratio: 4 / 5;
        overflow: hidden;
        border: none;
        border-radius: 10px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background: #0d120f;
        position: relative;
      }

      .gallery-image img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .campaign-gallery + .campaign-gallery {
        content-visibility: auto;
        contain-intrinsic-size: 1200px 1500px;
      }

      .gallery-image:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 24px rgba(0, 166, 82, 0.2);
      }

      @media (max-width: 768px) {
        .campaign-gallery {
          grid-template-columns: repeat(2, 1fr);
          gap: 0.8rem;
          padding: 1.5rem 1rem;
        }

        .gallery-item.landscape-item {
          grid-column: span 2;
        }

      }

      @media (max-width: 480px) {
        .campaign-gallery {
          grid-template-columns: 1fr;
          gap: 0.6rem;
          padding: 1rem;
        }

        .gallery-item.landscape-item {
          grid-column: span 1;
        }

      }

      .gallery-image {
        cursor: pointer;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-content {
        position: relative;
        max-width: 90vw;
        max-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .campaign-modal-content {
        background: transparent;
        border: none;
        box-shadow: none;
      }

      .modal-image {
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        border: none;
        outline: none;
        box-shadow: none;
        margin: 0;
        padding: 0;
        display: block;
      }
    </style>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const galleryImages = document.querySelectorAll('.gallery-image');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const resolveAsset = window.inrenResolveAssetUrl || ((value) => value);

        galleryImages.forEach(img => {
          const thumbnail = img.querySelector('img');
          const imageUrl = thumbnail?.getAttribute('src') || thumbnail?.src || '';
          if (thumbnail) {
            thumbnail.src = resolveAsset(imageUrl);
          }

          img.addEventListener('click', function() {
            modalImage.src = resolveAsset(imageUrl);
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
          });
        });

        modal.addEventListener('click', function(e) {
          modal.classList.remove('active');
          document.body.style.overflow = 'auto';
        });

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
          }
        });
      });
    </script>
